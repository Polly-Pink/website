name: Deploy Documentation to GitHub Pages

# Trigger workflow on pushes to the main branch
on:
  push:
    branches: [main]

# Define required permissions for the workflow
permissions:
  contents: read     # Needed to access repository contents
  pages: write       # Needed to publish to GitHub Pages
  id-token: write    # Required for authentication if using OIDC or other token-based actions

# Ensure only one deployment runs at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    # Associate the deployment with the GitHub Pages environment
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # Step 1: Checkout the repository to access source files
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up pnpm package manager
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10    # Specify pnpm version
          cache: true    # Enable caching to speed up installs

      # Step 3: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20  # Specify Node.js version
          cache: pnpm       # Cache pnpm dependencies for faster builds

      # Step 4: Install dependencies exactly as specified in lockfile
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Step 5: Generate static documentation site
      - name: Build Documentation
        run: pnpm generate

      # Step 6: Upload generated site for deployment
      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .docs/code  # Path to generated static site

      # Step 7: Deploy the uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deploy  # Allows access to page URL via outputs